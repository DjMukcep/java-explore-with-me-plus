server.port=9090
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.open-in-view=false
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:6542/ewm-stats}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stat}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:stat}